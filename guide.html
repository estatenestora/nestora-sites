<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Nestora — User Guide</title>
  <meta name="description" content="Complete step-by-step guide for all Nestora flows.">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1c2330;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --green: #10b981;
      --orange: #f59e0b;
      --purple: #a78bfa;
      --red: #f87171;
      --sky: #0ea5e9;
      --radius: 12px;
      --ease: 0.28s cubic-bezier(.4, 0, .2, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      height: 100%;
      font-family: -apple-system, 'SF Pro Text', 'Inter', BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ─── Layout ─────────────────────────────────────── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ─── Header ─────────────────────────────────────── */
    .hdr {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 10;
    }

    .hdr-logo {
      font-size: 20px;
    }

    .hdr-title {
      font-size: 15px;
      font-weight: 700;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .hdr-sub {
      font-size: 10px;
      color: var(--muted);
      margin-top: 1px;
    }

    .hbtn {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      background: var(--surface2);
      border: 1px solid var(--border);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: var(--muted);
      flex-shrink: 0;
      transition: background var(--ease);
    }

    .hbtn:active {
      background: var(--border);
    }

    /* ─── Drawer ─────────────────────────────────────── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 50;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(3px);
    }

    .overlay.open {
      display: block;
    }

    .drawer {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: 82%;
      max-width: 310px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      z-index: 51;
      transform: translateX(-100%);
      transition: transform 0.32s cubic-bezier(.4, 0, .2, 1);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .drawer.open {
      transform: translateX(0);
    }

    .drawer-hdr {
      padding: 14px 14px 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .drawer-hdr h2 {
      font-size: 14px;
      font-weight: 700;
    }

    .drawer-close {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--surface2);
      border: 1px solid var(--border);
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
    }

    .dgroup {
      padding: 8px 0;
    }

    .dgroup-lbl {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--muted);
      text-transform: uppercase;
      padding: 4px 14px 5px;
    }

    .ditem {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      cursor: pointer;
      transition: background var(--ease);
      border-left: 3px solid transparent;
    }

    .ditem:active,
    .ditem:hover {
      background: var(--surface2);
    }

    .ditem.active {
      border-left-color: var(--accent);
      background: var(--surface2);
    }

    .ditem-icon {
      font-size: 17px;
      width: 22px;
      text-align: center;
      flex-shrink: 0;
    }

    .ditem-name {
      font-size: 13px;
      font-weight: 600;
    }

    .ditem-count {
      font-size: 10px;
      color: var(--muted);
    }

    /* ─── Role badges ────────────────────────────────── */
    .rbadge {
      font-size: 9px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 999px;
      letter-spacing: 0.5px;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .rc {
      background: rgba(14, 165, 233, .15);
      color: var(--sky);
      border: 1px solid rgba(14, 165, 233, .3);
    }

    .rp {
      background: rgba(16, 185, 129, .15);
      color: var(--green);
      border: 1px solid rgba(16, 185, 129, .3);
    }

    .ra {
      background: rgba(245, 158, 11, .15);
      color: var(--orange);
      border: 1px solid rgba(245, 158, 11, .3);
    }

    .rk {
      background: rgba(167, 139, 250, .15);
      color: var(--purple);
      border: 1px solid rgba(167, 139, 250, .3);
    }

    .rb {
      background: rgba(16, 185, 129, .1);
      color: var(--green);
      border: 1px solid rgba(16, 185, 129, .2);
    }

    /* ─── Content area ───────────────────────────────── */
    .content {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ─── Flow header bar ────────────────────────────── */
    .flow-hdr {
      padding: 12px 14px 8px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      display: none;
    }

    .flow-title-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 7px;
    }

    .flow-icon {
      font-size: 18px;
    }

    .flow-name {
      font-size: 15px;
      font-weight: 700;
      flex: 1;
    }

    .prog-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .prog-track {
      flex: 1;
      height: 3px;
      background: var(--border);
      border-radius: 999px;
      overflow: hidden;
    }

    .prog-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--purple));
      border-radius: 999px;
      transition: width 0.4s var(--ease);
    }

    .prog-txt {
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ─── Welcome screen ─────────────────────────────── */
    #welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
      text-align: center;
      gap: 14px;
    }

    #welcome .w-logo {
      font-size: 54px;
      line-height: 1;
    }

    #welcome .w-title {
      font-size: 22px;
      font-weight: 800;
    }

    #welcome .w-sub {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      max-width: 272px;
    }

    /* ─── Flow Overview screen ───────────────────────── */
    #overview {
      flex: 1;
      overflow-y: auto;
      display: none;
      padding: 14px 14px 80px;
      flex-direction: column;
      gap: 14px;
    }

    .ov-hero {
      background: linear-gradient(135deg, #1a2537, #1c1a30);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .ov-hero-top {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .ov-hero-icon {
      font-size: 28px;
    }

    .ov-hero-title {
      font-size: 18px;
      font-weight: 800;
      flex: 1;
    }

    .ov-hero-sub {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    .ov-hero-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .ov-meta-chip {
      font-size: 10px;
      color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 2px 8px;
    }

    .ov-section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.7px;
      text-transform: uppercase;
      color: var(--muted);
      padding: 4px 0;
    }

    /* Step timeline */
    .step-timeline {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .tl-item {
      display: flex;
      gap: 0;
      cursor: pointer;
      transition: background var(--ease);
      border-radius: 10px;
      overflow: hidden;
    }

    .tl-item:active {
      background: var(--surface2);
    }

    .tl-left {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 36px;
      flex-shrink: 0;
    }

    .tl-num {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      flex-shrink: 0;
      margin-top: 10px;
      transition: all var(--ease);
    }

    .tl-num.done {
      background: rgba(88, 166, 255, .15);
      border-color: var(--accent);
      color: var(--accent);
    }

    .tl-num.current {
      background: linear-gradient(135deg, #1d4ed8, #7c3aed);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 2px 8px rgba(88, 166, 255, .35);
    }

    .tl-line {
      width: 2px;
      flex: 1;
      background: var(--border);
      margin: 4px auto;
    }

    .tl-item:last-child .tl-line {
      display: none;
    }

    .tl-right {
      flex: 1;
      padding: 8px 10px 8px 2px;
    }

    .tl-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .tl-state {
      font-size: 9px;
      font-family: monospace;
      color: var(--accent);
      opacity: .8;
      letter-spacing: .5px;
      text-transform: uppercase;
    }

    .tl-sub {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.4;
      margin-top: 3px;
    }

    .tl-arrow {
      font-size: 14px;
      color: var(--muted);
      display: flex;
      align-items: center;
      padding-right: 2px;
    }

    .ov-start-btn {
      width: 100%;
      padding: 13px;
      border-radius: var(--radius);
      background: linear-gradient(135deg, #1d4ed8, #7c3aed);
      border: none;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(88, 166, 255, .25);
      transition: opacity var(--ease);
    }

    .ov-start-btn:active {
      opacity: 0.85;
    }

    /* ─── Steps viewport ─────────────────────────────── */
    #steps-vp {
      flex: 1;
      overflow: hidden;
      position: relative;
      display: none;
    }

    .steps-track {
      display: flex;
      height: 100%;
      transition: transform 0.35s cubic-bezier(.4, 0, .2, 1);
    }

    .step-card {
      min-width: 100%;
      height: 100%;
      overflow-y: auto;
      padding: 14px 14px 90px;
      display: flex;
      flex-direction: column;
      gap: 11px;
    }

    .step-num-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 3px 10px;
      font-size: 11px;
      color: var(--muted);
      font-weight: 600;
      align-self: flex-start;
    }

    .step-num-chip .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
    }

    .state-lbl {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .8px;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: 999px;
      align-self: flex-start;
      background: rgba(88, 166, 255, .1);
      color: var(--accent);
      border: 1px solid rgba(88, 166, 255, .22);
      font-family: monospace;
    }

    .step-h {
      font-size: 20px;
      font-weight: 800;
      line-height: 1.22;
    }

    .step-sub {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }

    .icard {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 11px 13px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .icard-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .6px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .icard-body {
      font-size: 13px;
      line-height: 1.6;
    }

    .btns-row {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .bchip {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 7px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      white-space: nowrap;
    }

    .bchip.p {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(88, 166, 255, .08);
    }

    .bchip.s {
      border-color: var(--green);
      color: var(--green);
      background: rgba(16, 185, 129, .08);
    }

    .bchip.w {
      border-color: var(--orange);
      color: var(--orange);
      background: rgba(245, 158, 11, .08);
    }

    .bchip.d {
      border-color: var(--red);
      color: var(--red);
      background: rgba(248, 113, 113, .08);
    }

    .tip {
      display: flex;
      gap: 9px;
      align-items: flex-start;
      background: rgba(124, 58, 237, .08);
      border: 1px solid rgba(124, 58, 237, .2);
      border-radius: var(--radius);
      padding: 9px 11px;
    }

    .tip-icon {
      font-size: 14px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .tip-text {
      font-size: 12px;
      line-height: 1.55;
    }

    .tip-text strong {
      color: #a78bfa;
    }

    .fee-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }

    .fee-table th {
      background: var(--border);
      padding: 5px 7px;
      text-align: left;
      color: var(--muted);
      font-weight: 600;
    }

    .fee-table td {
      padding: 5px 7px;
      border-top: 1px solid var(--border);
    }

    /* ─── Nav bar ────────────────────────────────────── */
    .nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: none;
      align-items: center;
      gap: 9px;
      padding: 10px 14px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      z-index: 20;
    }

    .nav.show {
      display: flex;
    }

    .nbtn {
      flex: 1;
      padding: 10px;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      transition: all var(--ease);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .nbtn:active {
      background: var(--border);
    }

    .nbtn:disabled {
      opacity: .3;
      cursor: not-allowed;
    }

    .nbtn.prim {
      background: linear-gradient(135deg, #1d4ed8, #7c3aed);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 3px 10px rgba(88, 166, 255, .25);
    }

    .nbtn.prim:active {
      opacity: .88;
    }

    .nbtn.outline {
      background: transparent;
      flex: 0.6;
    }

    .step-ind {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      min-width: 46px;
      flex-shrink: 0;
    }

    /* ─── Utility ────────────────────────────────────── */
    .gbtn {
      width: 100%;
      padding: 12px;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      transition: all var(--ease);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }

    .gbtn:active {
      background: var(--border);
    }

    .gbtn.prim {
      background: linear-gradient(135deg, #1d4ed8, #7c3aed);
      border-color: transparent;
      color: #fff;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .step-card,
    #overview {
      animation: fadeUp .28s ease;
    }
  </style>
</head>

<body>
  <div class="app">

    <!-- Header -->
    <div class="hdr">
      <button class="hbtn" onclick="openDrawer()" aria-label="All flows">☰</button>
      <div class="hdr-logo">🏠</div>
      <div style="flex:1;min-width:0">
        <div class="hdr-title" id="hdr-title">Nestora Guide</div>
        <div class="hdr-sub" id="hdr-sub">Tap ☰ to pick a flow</div>
      </div>
      <button class="hbtn" id="overview-btn" onclick="showOverview()" style="display:none" title="Flow map">📋</button>
    </div>

    <!-- Drawer overlay -->
    <div class="overlay" id="overlay" onclick="closeDrawer()"></div>

    <!-- Drawer -->
    <div class="drawer" id="drawer">
      <div class="drawer-hdr">
        <h2>All Flows</h2>
        <button class="drawer-close" onclick="closeDrawer()">✕</button>
      </div>
      <div id="drawer-body"></div>
    </div>

    <!-- Main content -->
    <div class="content" id="content">

      <!-- Flow header (progress bar) -->
      <div class="flow-hdr" id="flow-hdr">
        <div class="flow-title-row">
          <span class="flow-icon" id="fh-icon"></span>
          <span class="flow-name" id="fh-name"></span>
          <span class="rbadge" id="fh-role"></span>
        </div>
        <div class="prog-wrap">
          <div class="prog-track">
            <div class="prog-fill" id="prog-fill" style="width:0%"></div>
          </div>
          <div class="prog-txt" id="prog-txt">0 / 0</div>
        </div>
      </div>

      <!-- Welcome screen -->
      <div id="welcome">
        <div class="w-logo">🏠</div>
        <div class="w-title">Nestora Guide</div>
        <div class="w-sub">A complete visual guide to every flow in Nestora — from finding a service to getting paid.
        </div>
        <button class="gbtn prim" style="margin-top:6px;max-width:220px" onclick="openDrawer()">☰ Browse All
          Flows</button>
      </div>

      <!-- Flow Overview screen -->
      <div id="overview"
        style="display:none;flex:1;overflow-y:auto;padding:14px 14px 80px;flex-direction:column;gap:14px"></div>

      <!-- Steps viewport -->
      <div id="steps-vp" style="display:none;flex:1;overflow:hidden;position:relative">
        <div class="steps-track" id="steps-track"></div>
      </div>

    </div>

    <!-- Nav bar -->
    <div class="nav" id="nav">
      <button class="nbtn" id="prev-btn" onclick="navigate(-1)" disabled>← Prev</button>
      <div class="step-ind" id="step-ind">1 / 1</div>
      <button class="nbtn prim" id="next-btn" onclick="navigate(1)">Next →</button>
    </div>

  </div>
  <script>
    // ─────────────────────────────────────────────────────────────────────────────
    // ROLE (from URL param ?role=admin)
    // ─────────────────────────────────────────────────────────────────────────────
    const urlParams = new URLSearchParams(window.location.search);
    const userRole = (urlParams.get('role') || 'user').toLowerCase();
    const isAdmin = userRole === 'admin';

    // ─────────────────────────────────────────────────────────────────────────────
    // FLOWS DATA
    // ─────────────────────────────────────────────────────────────────────────────
    const FLOWS = [
      // ════════════════════════════════ CUSTOMER ════════════════════════════════
      {
        id: 'find-llm', group: 'customer', icon: '🔍',
        title: 'Find a Service (AI Search)',
        desc: 'Describe what you need in plain language — AI finds the right provider for you.',
        role: 'c', roleLabel: '👤 Customer',
        steps: [
          {
            title: 'Open Main Menu',
            state: 'MAIN_MENU',
            sub: 'Start from the Nestora bot main menu.',
            what: 'The bot shows the main keyboard: Register Service, Find Service, Bookings, My Profile, Support.',
            action: 'Tap <strong>🔍 Find Service</strong> to begin searching.',
            buttons: [{ l: '🔍 Find Service', t: 'p' }],
            tip: 'The AI understands natural language — type freely like you\'re texting a friend!'
          },
          {
            title: 'Describe What You Need',
            state: 'SEARCH_START',
            sub: 'Type your requirement as a normal sentence.',
            what: 'The bot prompts: "What service do you need?" Type a natural description including service type, area, and any specific requirements.',
            action: 'Type something like: <em>"Need a plumber in Baner, Pune. Urgent pipe leak."</em> and send.',
            buttons: [{ l: '🔄 New Search', t: '' }, { l: '🔙 Back to Menu', t: '' }],
            tip: '<strong>60-second cooldown</strong> between searches. If you just searched, wait a moment.'
          },
          {
            title: 'AI Processes Your Query',

    // ─────────────────────────────────────────────────────────────────────────────
    // GROUPS
    // ─────────────────────────────────────────────────────────────────────────────
    const GROUPS = [
      { id: 'customer', label: '👤 Customer Flows' },
      { id: 'provider', label: '🔧 Provider Flows' },
      { id: 'kyc', label: '🔑 Verification' },
      { id: 'profile', label: '📋 Profile & Listing' },
      { id: 'admin', label: '🛡️ Admin Flows' },
      { id: 'reference', label: '📚 Reference' }
    ];

    const ROLE_BADGE = {
      c: { cls: 'rc', lbl: '👤 Customer' },
      p: { cls: 'rp', lbl: '🔧 Provider' },
      a: { cls: 'ra', lbl: '🛡️ Admin' },
      k: { cls: 'rk', lbl: '🔑 All Users' },
      b: { cls: 'rb', lbl: '👤🔧 Both' }
    };

    // ─────────────────────────────────────────────────────────────────────────────
    // STATE
    // ─────────────────────────────────────────────────────────────────────────────
    let currentFlow = null;
    let currentStep = 0;
    let mode = 'welcome'; // 'welcome' | 'overview' | 'steps'

    // Visible flows (filtered by role)
    function visibleFlows() {
      return FLOWS.filter(f => isAdmin || !f.adminOnly);
    }

    // ─────────────────────────────────────────────────────────────────────────────
    // INIT
    // ─────────────────────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
      }
      buildDrawer();

      const flowId = urlParams.get('flow');
      if (flowId) {
        const f = visibleFlows().find(f => f.id === flowId);
        if (f) { loadFlow(f); return; }
      }
      showWelcome();
    });

    // ─────────────────────────────────────────────────────────────────────────────
    // DRAWER
    // ─────────────────────────────────────────────────────────────────────────────
    function buildDrawer() {
      const body = document.getElementById('drawer-body');
      body.innerHTML = '';
      const vf = visibleFlows();

      for (const g of GROUPS) {
        const gFlows = vf.filter(f => f.group === g.id);
        if (!gFlows.length) continue;
        const grpEl = document.createElement('div');
        grpEl.className = 'dgroup';
        grpEl.innerHTML = `<div class="dgroup-lbl">${g.label}</div>`;
        for (const flow of gFlows) {
          const item = document.createElement('div');
          item.className = 'ditem' + (currentFlow && currentFlow.id === flow.id ? ' active' : '');
          item.dataset.id = flow.id;
          item.innerHTML = `
        <div class="ditem-icon">${flow.icon}</div>
        <div style="flex:1">
          <div class="ditem-name">${flow.title}</div>
          <div class="ditem-count">${flow.steps.length} steps</div>
        </div>`;
          item.addEventListener('click', () => { loadFlow(flow); closeDrawer(); });
          grpEl.appendChild(item);
        }
        body.appendChild(grpEl);
      }
    }

    function openDrawer() { document.getElementById('drawer').classList.add('open'); document.getElementById('overlay').classList.add('open'); buildDrawer(); }
    function closeDrawer() { document.getElementById('drawer').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); }

    // ─────────────────────────────────────────────────────────────────────────────
    // SCREENS
    // ─────────────────────────────────────────────────────────────────────────────
    function showWelcome() {
      mode = 'welcome';
      document.getElementById('welcome').style.display = 'flex';
      document.getElementById('overview').style.display = 'none';
      document.getElementById('steps-vp').style.display = 'none';
      document.getElementById('flow-hdr').style.display = 'none';
      document.getElementById('nav').classList.remove('show');
      document.getElementById('overview-btn').style.display = 'none';
      document.getElementById('hdr-title').textContent = 'Nestora Guide';
      document.getElementById('hdr-sub').textContent = 'Tap ☰ to pick a flow';
    }

    function loadFlow(flow) {
      currentFlow = flow;
      currentStep = 0;

      // Update header
      document.getElementById('hdr-sub').textContent = flow.title;
      const rb = ROLE_BADGE[flow.role] || ROLE_BADGE.k;
      document.getElementById('fh-icon').textContent = flow.icon;
      document.getElementById('fh-name').textContent = flow.title;
      const roleEl = document.getElementById('fh-role');
      roleEl.textContent = rb.lbl;
      roleEl.className = 'rbadge ' + rb.cls;
      document.getElementById('flow-hdr').style.display = 'block';
      document.getElementById('overview-btn').style.display = 'flex';

      // Build steps
      buildSteps(flow);
      showOverview(); // always start with overview
    }

    // ─── Overview screen ────────────────────────────────────────────────────────
    function showOverview() {
      if (!currentFlow) return;
      mode = 'overview';

      document.getElementById('welcome').style.display = 'none';
      document.getElementById('steps-vp').style.display = 'none';
      document.getElementById('overview-btn').style.display = 'flex';

      const ov = document.getElementById('overview');
      ov.style.cssText = 'display:flex;flex:1;overflow-y:auto;padding:14px 14px 80px;flex-direction:column;gap:14px';

      const rb = ROLE_BADGE[currentFlow.role] || ROLE_BADGE.k;

      ov.innerHTML = `
    <!-- Hero card -->
    <div class="ov-hero">
      <div class="ov-hero-top">
        <div class="ov-hero-icon">${currentFlow.icon}</div>
        <div class="ov-hero-title">${currentFlow.title}</div>
      </div>
      <div class="ov-hero-sub">${currentFlow.desc}</div>
      <div class="ov-hero-meta">
        <span class="rbadge ${rb.cls}">${rb.lbl}</span>
        <span class="ov-meta-chip">${currentFlow.steps.length} steps</span>
      </div>
    </div>

    <!-- Step map title -->
    <div class="ov-section-title">📋 Complete Step Map — tap any step to jump to it</div>

    <!-- Timeline -->
    <div class="step-timeline" id="ov-timeline"></div>

    <!-- Start button -->
    <button class="ov-start-btn" onclick="enterSteps(0)">▶ Start Step-by-Step Guide</button>
  `;

      // Build timeline
      const tl = document.getElementById('ov-timeline');
      currentFlow.steps.forEach((step, i) => {
        const item = document.createElement('div');
        item.className = 'tl-item';
        item.innerHTML = `
      <div class="tl-left">
        <div class="tl-num">${i + 1}</div>
        <div class="tl-line"></div>
      </div>
      <div class="tl-right">
        <div class="tl-title">${step.title}</div>
        <div class="tl-state">${step.state}</div>
        <div class="tl-sub">${step.sub}</div>
      </div>
      <div class="tl-arrow">›</div>
    `;
        item.addEventListener('click', () => enterSteps(i));
        tl.appendChild(item);
      });

      // Nav bar for overview
      document.getElementById('nav').classList.add('show');
      document.getElementById('prev-btn').textContent = '☰ All Flows';
      document.getElementById('prev-btn').disabled = false;
      document.getElementById('prev-btn').onclick = openDrawer;
      document.getElementById('step-ind').textContent = '';
      document.getElementById('next-btn').textContent = '▶ Start';
      document.getElementById('next-btn').onclick = () => enterSteps(0);
    }

    // ─── Steps screen ────────────────────────────────────────────────────────────
    function enterSteps(stepIndex) {
      mode = 'steps';
      document.getElementById('overview').style.display = 'none';
      document.getElementById('steps-vp').style.display = 'block';
      renderStep(stepIndex);
    }

    function buildSteps(flow) {
      const track = document.getElementById('steps-track');
      track.innerHTML = '';
      flow.steps.forEach((step, i) => {
        const card = document.createElement('div');
        card.className = 'step-card';
        card.innerHTML = buildStepHTML(step, i, flow.steps.length);
        track.appendChild(card);
      });
    }

    function buildStepHTML(step, idx, total) {
      let btnsHTML = '';
      if (step.buttons && step.buttons.length) {
        btnsHTML = `<div class="icard">
      <div class="icard-title">Buttons you\'ll see</div>
      <div class="btns-row">${step.buttons.map(b => `<span class="bchip ${b.t}">${b.l}</span>`).join('')}</div>
    </div>`;
      }
      let tipHTML = '';
      if (step.tip) {
        tipHTML = `<div class="tip">
      <div class="tip-icon">💡</div>
      <div class="tip-text">${step.tip}</div>
    </div>`;
      }
      return `
    <div class="step-num-chip"><div class="dot"></div>Step ${idx + 1} of ${total}</div>
    <span class="state-lbl">${step.state}</span>
    <div class="step-h">${step.title}</div>
    <div class="step-sub">${step.sub}</div>
    <div class="icard">
      <div class="icard-title">What\'s happening</div>
      <div class="icard-body">${step.what.replace(/\n/g, '<br>')}</div>
    </div>
    <div class="icard">
      <div class="icard-title">What to do</div>
      <div class="icard-body">${step.action}</div>
    </div>
    ${btnsHTML}${tipHTML}
  `;
    }

    // ─────────────────────────────────────────────────────────────────────────────
    // NAVIGATION
    // ─────────────────────────────────────────────────────────────────────────────
    function renderStep(idx) {
      if (!currentFlow) return;
      currentStep = Math.max(0, Math.min(idx, currentFlow.steps.length - 1));

      // Slide
      document.getElementById('steps-track').style.transform = `translateX(-${currentStep * 100}%)`;

      // Progress
      const pct = currentFlow.steps.length === 1 ? 100 : (currentStep / (currentFlow.steps.length - 1)) * 100;
      document.getElementById('prog-fill').style.width = pct + '%';
      document.getElementById('prog-txt').textContent = `${currentStep + 1} / ${currentFlow.steps.length}`;

      // Nav
      document.getElementById('nav').classList.add('show');
      document.getElementById('step-ind').textContent = `${currentStep + 1} / ${currentFlow.steps.length}`;

      const prevBtn = document.getElementById('prev-btn');
      prevBtn.disabled = false;
      if (currentStep === 0) {
        prevBtn.textContent = '📋 Overview';
        prevBtn.onclick = showOverview;
      } else {
        prevBtn.textContent = '← Prev';
        prevBtn.onclick = () => navigate(-1);
      }

      const nextBtn = document.getElementById('next-btn');
      if (currentStep === currentFlow.steps.length - 1) {
        nextBtn.textContent = '☰ All Flows';
        nextBtn.onclick = openDrawer;
      } else {
        nextBtn.textContent = 'Next →';
        nextBtn.onclick = () => navigate(1);
      }
    }

    function navigate(dir) {
      if (mode !== 'steps') return;
      renderStep(currentStep + dir);
    }

    // ─────────────────────────────────────────────────────────────────────────────
    // SWIPE (steps only)
    // ─────────────────────────────────────────────────────────────────────────────
    let touchX = 0;
    document.getElementById('steps-vp').addEventListener('touchstart', e => {
      touchX = e.touches[0].clientX;
    }, { passive: true });
    document.getElementById('steps-vp').addEventListener('touchend', e => {
      const dx = touchX - e.changedTouches[0].clientX;
      if (Math.abs(dx) > 48) navigate(dx > 0 ? 1 : -1);
    }, { passive: true });
  </script>
</body>

</html>
