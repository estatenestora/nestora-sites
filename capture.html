<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nestora – Live Capture</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --purple: #7c3aed;
            --purple-light: #a855f7;
            --bg: #0f0c29;
            --card-bg: rgba(255, 255, 255, 0.07);
            --border: rgba(255, 255, 255, 0.13);
            --text: #fff;
            --muted: rgba(255, 255, 255, 0.55);
            --red: #ef4444;
            --green: #10b981;
        }

        html,
        body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #0f0c29 0%, #302b63 60%, #24243e 100%);
            color: var(--text);
            overflow-x: hidden;
        }

        /* ── LAYOUT ── */
        .page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 28px 22px 24px;
            width: 100%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, .45);
        }

        .logo {
            font-size: 38px;
            margin-bottom: 6px;
        }

        h1 {
            font-size: 21px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .subtitle {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.55;
            margin-bottom: 20px;
        }

        /* ── CAMERA BOX ── */
        .cam-wrap {
            position: relative;
            width: 100%;
            border-radius: 18px;
            overflow: hidden;
            background: #000;
            border: 2px solid rgba(167, 139, 250, .35);
            box-shadow: 0 8px 30px rgba(0, 0, 0, .5);
            margin-bottom: 20px;
        }

        /* Selfie / Profile = 1:1 square crop */
        .cam-wrap.mode-selfie {
            aspect-ratio: 1/1;
        }

        .cam-wrap.mode-profile {
            aspect-ratio: 1/1;
        }

        /* Aadhaar = landscape card ratio */
        .cam-wrap.mode-aadhaar {
            aspect-ratio: 1.7/1;
        }

        video,
        #preview {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #preview {
            display: none;
        }

        /* ── OVERLAY FRAMES ── */
        .frame-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Circle for selfie – punches a transparent hole in a dark backdrop */
        .frame-circle {
            width: 68%;
            aspect-ratio: 1/1;
            border-radius: 50%;
            border: 2.5px dashed rgba(167, 139, 250, .75);
            box-shadow:
                0 0 0 9999px rgba(0, 0, 0, .42),
                0 0 20px rgba(167, 139, 250, .35);
        }

        /* Rounded rectangle for Aadhaar */
        .frame-rect {
            width: 88%;
            aspect-ratio: 1.586/1;
            border-radius: 10px;
            border: 2.5px dashed rgba(14, 165, 233, .8);
            box-shadow:
                0 0 0 9999px rgba(0, 0, 0, .42),
                0 0 20px rgba(14, 165, 233, .3);
        }

        .frame-label {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, .7);
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 11px;
            letter-spacing: .5px;
            white-space: nowrap;
            color: rgba(255, 255, 255, .85);
        }

        /* ── CONTROLS ── */
        .controls {
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 12px;
        }

        .ctrl-placeholder {
            width: 52px;
            height: 52px;
        }

        /* Shutter */
        .shutter {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #fff;
            border: none;
            cursor: pointer;
            box-shadow: 0 0 0 5px rgba(255, 255, 255, .18), 0 8px 24px rgba(0, 0, 0, .35);
            transition: transform .15s, box-shadow .15s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .shutter::after {
            content: '';
            width: 57px;
            height: 57px;
            border-radius: 50%;
            border: 2px solid #1a1a2e;
        }

        .shutter:hover {
            transform: scale(1.05);
        }

        .shutter:active {
            transform: scale(.92);
            box-shadow: 0 0 0 5px rgba(255, 255, 255, .12);
        }

        /* Switch camera */
        .switch-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .1);
            border: 1px solid rgba(255, 255, 255, .15);
            color: #fff;
            font-size: 22px;
            cursor: pointer;
            transition: background .2s, transform .2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .switch-btn:hover {
            background: rgba(255, 255, 255, .2);
            transform: rotate(45deg);
        }

        .switch-btn:active {
            transform: rotate(90deg) scale(.9);
        }

        .switch-btn.hidden {
            visibility: hidden;
            pointer-events: none;
        }

        /* ── DECISION BUTTONS ── */
        .decision {
            display: none;
            gap: 14px;
            padding: 0 4px;
        }

        .btn {
            flex: 1;
            padding: 14px 10px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: transform .2s, box-shadow .2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--purple), var(--purple-light));
            color: #fff;
            box-shadow: 0 6px 20px rgba(124, 58, 237, .42);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 28px rgba(124, 58, 237, .58);
        }

        .btn-secondary {
            background: rgba(239, 68, 68, .14);
            border: 1px solid rgba(239, 68, 68, .35);
            color: #fca5a5;
        }

        .btn-secondary:hover {
            background: rgba(239, 68, 68, .25);
        }

        /* ── STATUS / SPINNER ── */
        .status {
            font-size: 13px;
            min-height: 22px;
            margin-top: 14px;
            color: #fca5a5;
            transition: color .3s;
        }

        .status.ok {
            color: #6ee7b7;
        }

        .status.muted {
            color: var(--muted);
        }

        .spinner {
            display: none;
            width: 34px;
            height: 34px;
            border: 4px solid rgba(255, 255, 255, .1);
            border-left-color: var(--purple-light);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 16px auto 0;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 380px) {
            .card {
                padding: 22px 14px 20px;
                border-radius: 22px;
            }

            h1 {
                font-size: 19px;
            }
        }
    </style>
</head>

<body>
    <div class="page">
        <div class="card">

            <div class="logo">🏠</div>
            <h1 id="ttl">Live Capture</h1>
            <p class="subtitle" id="sub">Starting camera…</p>

            <div class="cam-wrap" id="camWrap">
                <video id="vid" autoplay playsinline muted></video>
                <img id="preview" alt="preview">
                <div class="frame-overlay" id="frameOverlay"></div>
                <span class="frame-label" id="frameLabel"></span>
            </div>

            <div class="controls" id="liveCtrls">
                <div class="ctrl-placeholder"></div>
                <button class="shutter" id="shutterBtn" onclick="capture()" title="Take photo"></button>
                <button class="switch-btn" id="switchBtn" onclick="switchCam()" title="Switch camera">🔄</button>
            </div>

            <div class="decision" id="decisionCtrls" style="display:none;">
                <button class="btn btn-secondary" onclick="retake()">🔄 Retake</button>
                <button class="btn btn-primary" onclick="submit()">✅ Confirm &amp; Submit</button>
            </div>

            <div class="spinner" id="spin"></div>
            <p class="status" id="statusMsg"></p>

        </div>
    </div>

    <script>
        /* ─────────────────── CONFIG ─────────────────── */
        const params = new URLSearchParams(location.search);
        const MODE = params.get('mode') || 'selfie';   // selfie | aadhaar | profile
        const BOT = params.get('bot') || 'nestora_ai_dev1_bot';
        const USER_ID = params.get('user_id') || '';

        /* ─────────────────── ELEMENTS ─────────────────── */
        const vid = document.getElementById('vid');
        const preview = document.getElementById('preview');
        const camWrap = document.getElementById('camWrap');
        const frameOver = document.getElementById('frameOverlay');
        const frameLabel = document.getElementById('frameLabel');
        const liveCtrls = document.getElementById('liveCtrls');
        const decCtrls = document.getElementById('decisionCtrls');
        const shutterBtn = document.getElementById('shutterBtn');
        const switchBtn = document.getElementById('switchBtn');
        const spinEl = document.getElementById('spin');
        const statusEl = document.getElementById('statusMsg');
        const ttl = document.getElementById('ttl');
        const sub = document.getElementById('sub');

        /* ─────────────────── STATE ─────────────────── */
        let stream = null;
        let devices = [];      // VideoInputDevice[]
        let devIdx = 0;
        let capturedBlob = null;
        let isSubmitting = false;

        /* ─────────────────── INIT ─────────────────── */
        (async function init() {
            applyMode();

            try {
                /* Request permission once – this also makes labels available */
                const tempStream = await navigator.mediaDevices.getUserMedia({ video: true });
                tempStream.getTracks().forEach(t => t.stop());
            } catch (e) {
                setStatus('❌ Camera permission denied. Please allow access and reload.', false);
                return;
            }

            await buildDeviceList();
            await startStream();
        })();

        /* ─────────────────── MODE SETUP ─────────────────── */
        function applyMode() {
            camWrap.className = 'cam-wrap mode-' + MODE;

            if (MODE === 'aadhaar') {
                ttl.textContent = 'Aadhaar Card Upload';
                sub.textContent = 'Place your Aadhaar card flat inside the blue frame. Use the rear camera for best results.';
                frameOver.innerHTML = '<div class="frame-rect"></div>';
                frameLabel.textContent = 'Aadhaar Card Front';
            } else if (MODE === 'selfie') {
                ttl.textContent = 'Live Selfie Capture';
                sub.textContent = 'Look directly into the front camera. Keep your face inside the circle.';
                frameOver.innerHTML = '<div class="frame-circle"></div>';
                frameLabel.textContent = 'Center Face Here';
            } else {
                ttl.textContent = 'Profile Picture';
                sub.textContent = 'Look directly into the front camera and snap a fresh photo.';
                frameOver.innerHTML = '<div class="frame-circle"></div>';
                frameLabel.textContent = 'Center Face Here';
            }
        }

        /* ─────────────────── CAMERA DEVICES ─────────────────── */
        async function buildDeviceList() {
            try {
                const all = await navigator.mediaDevices.enumerateDevices();
                devices = all.filter(d => d.kind === 'videoinput');
            } catch (e) {
                devices = [];
            }

            if (devices.length <= 1) {
                switchBtn.classList.add('hidden');
            }

            /* Pick sensible default device index */
            if (devices.length > 1) {
                if (MODE === 'aadhaar') {
                    /* Prefer rear/back camera */
                    const back = devices.findIndex(d =>
                        /back|rear|environment|main/i.test(d.label));
                    devIdx = back !== -1 ? back : devices.length - 1;
                } else {
                    /* Prefer front camera */
                    const front = devices.findIndex(d =>
                        /front|user|selfie|face/i.test(d.label));
                    devIdx = front !== -1 ? front : 0;
                }
            } else {
                devIdx = 0;
            }
        }

        /* ─────────────────── STREAM ─────────────────── */
        async function startStream() {
            stopStream();
            setStatus('', true);

            let constraints;
            if (devices.length > 0 && devices[devIdx].deviceId) {
                constraints = {
                    video: {
                        deviceId: { exact: devices[devIdx].deviceId },
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    },
                    audio: false
                };
            } else {
                /* Fallback using facingMode */
                const facing = MODE === 'aadhaar' ? 'environment' : 'user';
                constraints = { video: { facingMode: facing }, audio: false };
            }

            try {
                stream = await navigator.mediaDevices.getUserMedia(constraints);
            } catch (_) {
                /* Last resort – accept any camera */
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ video: true });
                } catch (e2) {
                    setStatus('❌ Could not access camera: ' + e2.message);
                    return;
                }
            }

            vid.srcObject = stream;
            vid.style.display = 'block';
            preview.style.display = 'none';
            frameOver.style.display = 'flex';
            frameLabel.style.display = 'block';
            liveCtrls.style.display = 'flex';
            decCtrls.style.display = 'none';
            setStatus('', true);
        }

        function stopStream() {
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
                stream = null;
            }
        }

        /* ─────────────────── CAMERA SWITCH ─────────────────── */
        async function switchCam() {
            if (isSubmitting) return;
            if (devices.length > 1) {
                devIdx = (devIdx + 1) % devices.length;
            } else {
                /* Toggle facing mode */
                const curFacing = devices[0]?.facingMode;
                if (curFacing === 'environment') {
                    devIdx = 0;
                } else {
                    devIdx = 0;
                    const tmp = devices;
                    devices = tmp.length ? [{ ...tmp[0], facingMode: 'environment' }] : [];
                }
            }
            setStatus('Switching camera…', true);
            switchBtn.style.opacity = '0.5';
            await startStream();
            switchBtn.style.opacity = '1';
        }

        /* ─────────────────── CAPTURE ─────────────────── */
        function capture() {
            if (!vid.videoWidth) { setStatus('⚠️ Camera not ready yet.'); return; }

            /* Scale down to max 1024 px on the long edge */
            let w = vid.videoWidth;
            let h = vid.videoHeight;
            const maxDim = 1024;
            if (w > maxDim || h > maxDim) {
                if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
                else { w = Math.round(w * maxDim / h); h = maxDim; }
            }

            const canvas = document.createElement('canvas');
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(vid, 0, 0, w, h);

            canvas.toBlob(blob => {
                if (!blob) { setStatus('❌ Failed to capture frame.'); return; }

                const reader = new FileReader();
                reader.onloadend = () => {
                    const stamped = injectTimestamp(reader.result);
                    capturedBlob = new Blob([stamped], { type: 'image/jpeg' });

                    /* Show preview */
                    stopStream();
                    vid.style.display = 'none';
                    frameOver.style.display = 'none';
                    frameLabel.style.display = 'none';
                    preview.src = URL.createObjectURL(capturedBlob);
                    preview.style.display = 'block';

                    liveCtrls.style.display = 'none';
                    decCtrls.style.display = 'flex';
                    setStatus('');
                };
                reader.readAsArrayBuffer(blob);
            }, 'image/jpeg', 0.82);
        }

        /* ─────────────────── RETAKE ─────────────────── */
        function retake() {
            capturedBlob = null;
            decCtrls.style.display = 'none';
            startStream();
        }

        /* ─────────────────── SUBMIT ─────────────────── */
        async function submit() {
            if (!capturedBlob || isSubmitting) return;
            isSubmitting = true;

            decCtrls.style.display = 'none';
            spinEl.style.display = 'block';
            setStatus('📤 Uploading photo…', true);

            let fileID;
            try {
                fileID = await uploadToTmpfiles(capturedBlob);
            } catch (e) {
                spinEl.style.display = 'none';
                decCtrls.style.display = 'flex';
                isSubmitting = false;
                setStatus('❌ Upload failed: ' + e.message);
                return;
            }

            const downloadUrl = `https://tmpfiles.org/dl/${fileID}/capture.jpg`;

            // If running inside Telegram WebApp, send data directly and close
            if (window.Telegram && window.Telegram.WebApp && typeof window.Telegram.WebApp.sendData === 'function') {
                try {
                    window.Telegram.WebApp.sendData(downloadUrl);
                    window.Telegram.WebApp.close();
                    return;
                } catch (e) {
                    console.error("Telegram WebApp sendData failed: ", e);
                }
            }

            /*
             * Build the Telegram deep link payload (fallback for external browsers).
             * Format: photo_MODE_USERID_FILEID
             * e.g.:   photo_aadhaar_123456789_9876543
             *
             * Telegram /start parameter limit = 64 chars (A-Z a-z 0-9 _ -)
             * "photo_aadhaar_" (14) + USER_ID (≤10) + "_" (1) + fileID (≤9) ≤ 34 chars  ✓
             */
            const payload = `photo_${MODE}_${USER_ID}_${fileID}`;

            if (payload.length > 64) {
                spinEl.style.display = 'none';
                decCtrls.style.display = 'flex';
                isSubmitting = false;
                setStatus('❌ Payload too long (' + payload.length + ' chars). Contact support.');
                return;
            }

            const botLink = `https://t.me/${BOT}?start=${payload}`;

            setStatus('✅ Photo uploaded! Redirecting…', true);
            statusEl.className = 'status ok';

            /* Redirect and transition to success screen */
            setTimeout(() => {
                window.location.href = botLink;

                // Replace screen with confirmation message to avoid multiple active camera pages
                document.body.innerHTML = `
                    <div style="height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; text-align: center;">
                        <div style="background: var(--card-bg); backdrop-filter: blur(24px); border: 1px solid var(--border); border-radius: 28px; padding: 40px 22px; width: 100%; max-width: 400px; box-shadow: 0 30px 60px rgba(0,0,0,.45);">
                            <div style="font-size: 54px; margin-bottom: 20px; animation: scaleUp 0.4s ease-out;">✅</div>
                            <h1 style="font-size: 23px; font-weight: 700; margin-bottom: 12px; color: #fff;">Submission Complete!</h1>
                            <p style="color: var(--muted); font-size: 14px; line-height: 1.6; margin-bottom: 24px;">You have been redirected back to the Nestora bot. You can now close this browser tab.</p>
                            <button onclick="window.close()" style="background: linear-gradient(135deg, var(--purple), var(--purple-light)); color: #fff; padding: 14px 28px; border-radius: 14px; font-size: 15px; font-weight: 700; border: none; cursor: pointer; box-shadow: 0 6px 20px rgba(124,58,237,.42); width: 100%; transition: transform 0.2s;">Close Tab</button>
                        </div>
                    </div>
                `;

                // Try to close the tab automatically after redirect triggers (wait 3 seconds for protocol launch)
                setTimeout(() => {
                    window.close();
                }, 5000);
            }, 1000);
        }

        /* ─────────────────── UPLOAD ─────────────────── */
        /**
         * Uploads blob to tmpfiles.org and returns the numeric file ID string.
         * e.g. for https://tmpfiles.org/dl/1234567/capture.jpg → returns "1234567"
         */
        async function uploadToTmpfiles(blob) {
            const fd = new FormData();
            fd.append('file', blob, 'capture.jpg');

            const res = await fetch('https://tmpfiles.org/api/v1/upload', { method: 'POST', body: fd });
            if (!res.ok) throw new Error(`Server returned ${res.status}`);

            const json = await res.json();
            if (json.status !== 'success' || !json.data?.url)
                throw new Error('Bad response from upload server');

            /* Extract the numeric ID from the view URL.
               URL format: https://tmpfiles.org/1234567/capture.jpg */
            const viewUrl = json.data.url;              // e.g. https://tmpfiles.org/1234567/capture.jpg
            const match = viewUrl.match(/tmpfiles\.org\/([\w]+)\//i);
            if (!match) throw new Error('Could not parse file ID from: ' + viewUrl);
            return match[1];                            // returns "1234567"
        }

        /* ─────────────────── JPEG TIMESTAMP (liveness) ─────────────────── */
        function injectTimestamp(buf) {
            const u8 = new Uint8Array(buf);
            if (u8[0] !== 0xFF || u8[1] !== 0xD8) return u8;

            const now = new Date();
            const p = n => String(n).padStart(2, '0');
            const ts = `${now.getFullYear()}:${p(now.getMonth() + 1)}:${p(now.getDate())} ${p(now.getHours())}:${p(now.getMinutes())}:${p(now.getSeconds())}`;
            const com = new TextEncoder().encode(ts);
            const len = com.length + 2;
            const hdr = new Uint8Array([0xFF, 0xFE, (len >> 8) & 0xFF, len & 0xFF]);

            // Find where to insert. Default to immediately after SOI (offset 2)
            let insertOffset = 2;

            // If the marker after SOI is APP0 (0xFFE0) or APP1 (0xFFE1), skip it safely
            if (u8[2] === 0xFF && (u8[3] === 0xE0 || u8[3] === 0xE1)) {
                const appLength = (u8[4] << 8) + u8[5];
                insertOffset = 2 + appLength;
            }

            // Ensure insertOffset is within bounds
            if (insertOffset > u8.length) {
                insertOffset = 2;
            }

            const out = new Uint8Array(u8.length + hdr.length + com.length);
            out.set(u8.subarray(0, insertOffset), 0);
            out.set(hdr, insertOffset);
            out.set(com, insertOffset + hdr.length);
            out.set(u8.subarray(insertOffset), insertOffset + hdr.length + com.length);
            return out;
        }

        /* ─────────────────── HELPER ─────────────────── */
        function setStatus(msg, quiet = false) {
            statusEl.textContent = msg;
            statusEl.className = 'status' + (quiet ? ' muted' : '');
        }
    </script>
</body>

</html>
