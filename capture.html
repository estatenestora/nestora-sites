<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nestora – Live Capture</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --purple: #7c3aed;
            --purple-light: #a855f7;
            --bg: #0f0c29;
            --card-bg: rgba(255, 255, 255, 0.07);
            --border: rgba(255, 255, 255, 0.13);
            --text: #fff;
            --muted: rgba(255, 255, 255, 0.55);
            --red: #ef4444;
            --green: #10b981;
            --amber: #f59e0b;
        }

        html,
        body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #0f0c29 0%, #302b63 60%, #24243e 100%);
            color: var(--text);
            overflow-x: hidden;
        }

        /* ── LAYOUT ── */
        .page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            padding-top: max(20px, env(safe-area-inset-top));
            padding-bottom: max(20px, env(safe-area-inset-bottom));
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 28px 22px 24px;
            width: 100%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, .45);
        }

        .logo {
            font-size: 38px;
            margin-bottom: 6px;
        }

        h1 {
            font-size: 21px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .subtitle {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.55;
            margin-bottom: 20px;
            min-height: 34px;
        }

        /* ── CAMERA BOX ── */
        .cam-wrap {
            position: relative;
            width: 100%;
            border-radius: 18px;
            overflow: hidden;
            background: #000;
            border: 2px solid rgba(167, 139, 250, .35);
            box-shadow: 0 8px 30px rgba(0, 0, 0, .5);
            margin-bottom: 16px;
        }

        .cam-wrap.mode-selfie,
        .cam-wrap.mode-profile {
            aspect-ratio: 1/1;
        }

        .cam-wrap.mode-aadhaar {
            aspect-ratio: 1.7/1;
        }

        video,
        #preview {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
        }

        /* Mirror the front camera preview so it feels natural, like a browser selfie cam */
        video.mirrored {
            transform: scaleX(-1);
        }

        #preview {
            display: none;
        }

        /* ── OVERLAY FRAMES ── */
        .frame-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .frame-circle {
            width: 82%;
            aspect-ratio: 1/1;
            border-radius: 50%;
            border: 2.5px dashed rgba(167, 139, 250, .75);
            box-shadow:
                0 0 0 9999px rgba(0, 0, 0, .42),
                0 0 20px rgba(167, 139, 250, .35);
            transition: border-color .25s, box-shadow .25s;
        }

        .frame-rect {
            width: 92%;
            aspect-ratio: 1.586/1;
            border-radius: 10px;
            border: 2.5px dashed rgba(14, 165, 233, .8);
            box-shadow:
                0 0 0 9999px rgba(0, 0, 0, .42),
                0 0 20px rgba(14, 165, 233, .3);
        }

        .frame-label {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, .7);
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 11px;
            letter-spacing: .5px;
            white-space: nowrap;
            color: rgba(255, 255, 255, .85);
        }

        /* Small camera-facing badge, top-left */
        .facing-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, .55);
            border: 1px solid rgba(255, 255, 255, .18);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10.5px;
            letter-spacing: .4px;
            color: rgba(255, 255, 255, .8);
            display: none;
        }

        /* Center overlay shown while camera (re)initializes */
        .cam-loading {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 10px;
            background: rgba(0, 0, 0, .55);
            z-index: 3;
        }

        .cam-loading.show {
            display: flex;
        }

        .mini-spinner {
            width: 28px;
            height: 28px;
            border: 3px solid rgba(255, 255, 255, .15);
            border-left-color: var(--purple-light);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }

        .cam-loading span {
            font-size: 12px;
            color: rgba(255, 255, 255, .8);
        }

        /* Permission / hard-error state inside the camera box */
        .cam-error {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 24px;
            text-align: center;
            background: rgba(10, 8, 24, .92);
            z-index: 4;
        }

        .cam-error.show {
            display: flex;
        }

        .cam-error .icon {
            font-size: 34px;
        }

        .cam-error p {
            font-size: 13px;
            color: var(--muted);
            line-height: 1.5;
        }

        .retry-btn {
            background: linear-gradient(135deg, var(--purple), var(--purple-light));
            color: #fff;
            border: none;
            padding: 10px 22px;
            border-radius: 12px;
            font-size: 13.5px;
            font-weight: 700;
            cursor: pointer;
        }

        /* ── CONTROLS ── */
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 28px;
            padding: 4px 12px 0;
        }

        .side-btn-slot {
            width: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Shutter */
        .shutter {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #fff;
            border: none;
            cursor: pointer;
            box-shadow: 0 0 0 5px rgba(255, 255, 255, .18), 0 8px 24px rgba(0, 0, 0, .35);
            transition: transform .15s, box-shadow .15s, opacity .2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .shutter::after {
            content: '';
            width: 57px;
            height: 57px;
            border-radius: 50%;
            border: 2px solid #1a1a2e;
        }

        .shutter:hover {
            transform: scale(1.05);
        }

        .shutter:active {
            transform: scale(.92);
            box-shadow: 0 0 0 5px rgba(255, 255, 255, .12);
        }

        .shutter:disabled {
            opacity: .4;
            pointer-events: none;
        }

        /* Switch camera */
        .switch-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .1);
            border: 1px solid rgba(255, 255, 255, .15);
            color: #fff;
            font-size: 22px;
            cursor: pointer;
            transition: background .2s, transform .3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .switch-btn:hover {
            background: rgba(255, 255, 255, .2);
        }

        .switch-btn:active {
            transform: rotate(180deg) scale(.9);
        }

        .switch-btn:disabled {
            opacity: .35;
            pointer-events: none;
        }

        .switch-btn.hidden {
            visibility: hidden;
            pointer-events: none;
        }

        /* ── DECISION BUTTONS ── */
        .decision {
            display: none;
            gap: 14px;
            padding: 0 4px;
        }

        .btn {
            flex: 1;
            padding: 14px 10px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: transform .2s, box-shadow .2s, opacity .2s;
        }

        .btn:disabled {
            opacity: .5;
            pointer-events: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--purple), var(--purple-light));
            color: #fff;
            box-shadow: 0 6px 20px rgba(124, 58, 237, .42);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 28px rgba(124, 58, 237, .58);
        }

        .btn-secondary {
            background: rgba(239, 68, 68, .14);
            border: 1px solid rgba(239, 68, 68, .35);
            color: #fca5a5;
        }

        .btn-secondary:hover {
            background: rgba(239, 68, 68, .25);
        }

        /* ── QUALITY WARNING BANNER ── */
        .quality-warn {
            display: none;
            align-items: center;
            gap: 8px;
            background: rgba(245, 158, 11, .14);
            border: 1px solid rgba(245, 158, 11, .4);
            color: #fcd34d;
            font-size: 12px;
            padding: 8px 12px;
            border-radius: 12px;
            margin-bottom: 12px;
            text-align: left;
            line-height: 1.4;
        }

        .quality-warn.show {
            display: flex;
        }

        /* ── STATUS / SPINNER ── */
        .status {
            font-size: 13px;
            min-height: 22px;
            margin-top: 14px;
            color: #fca5a5;
            transition: color .3s;
        }

        .status.ok {
            color: #6ee7b7;
        }

        .status.muted {
            color: var(--muted);
        }

        .spinner {
            display: none;
            width: 34px;
            height: 34px;
            border: 4px solid rgba(255, 255, 255, .1);
            border-left-color: var(--purple-light);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 16px auto 0;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes scaleUp {
            from {
                transform: scale(.6);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 380px) {
            .card {
                padding: 22px 14px 20px;
                border-radius: 22px;
            }

            h1 {
                font-size: 19px;
            }
        }

        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: 0.001ms !important;
                transition-duration: 0.001ms !important;
            }
        }
    </style>
</head>

<body>
    <div class="page">
        <div class="card">

            <div class="logo">🏠</div>
            <h1 id="ttl">Live Capture</h1>
            <p class="subtitle" id="sub">Starting camera…</p>

            <div class="quality-warn" id="qualityWarn">⚠️ <span id="qualityWarnText"></span></div>

            <div class="cam-wrap" id="camWrap">
                <video id="vid" autoplay playsinline muted></video>
                <img id="preview" alt="preview">
                <div class="frame-overlay" id="frameOverlay"></div>
                <span class="frame-label" id="frameLabel"></span>
                <span class="facing-badge" id="facingBadge"></span>

                <div class="cam-loading" id="camLoading">
                    <div class="mini-spinner"></div>
                    <span id="camLoadingText">Connecting to camera…</span>
                </div>

                <div class="cam-error" id="camError">
                    <div class="icon">🚫</div>
                    <p id="camErrorText">Camera access is unavailable.</p>
                    <button class="retry-btn" id="retryBtn" onclick="retryPermission()">Try Again</button>
                </div>
            </div>

            <div class="controls" id="liveCtrls">
                <div class="side-btn-slot"></div>
                <button class="shutter" id="shutterBtn" onclick="capture()" title="Take photo"></button>
                <div class="side-btn-slot">
                    <button class="switch-btn hidden" id="switchBtn" onclick="switchCam()"
                        title="Switch camera">🔄</button>
                </div>
            </div>

            <div class="decision" id="decisionCtrls">
                <button class="btn btn-secondary" id="retakeBtn" onclick="retake()">🔄 Retake</button>
                <button class="btn btn-primary" id="submitBtn" onclick="submit()">✅ Confirm &amp; Submit</button>
            </div>

            <div class="spinner" id="spin"></div>
            <p class="status" id="statusMsg"></p>

        </div>
    </div>

    <script>
        /* ─────────────────── CONFIG ─────────────────── */
        const params = new URLSearchParams(location.search);
        const MODE = params.get('mode') || 'selfie';   // selfie | aadhaar | profile
        const BOT = params.get('bot') || 'nestora_ai_dev1_bot';
        const USER_ID = params.get('user_id') || '';
        const PREFERRED_FACING = MODE === 'aadhaar' ? 'environment' : 'user';

        /* ─────────────────── ELEMENTS ─────────────────── */
        const vid = document.getElementById('vid');
        const preview = document.getElementById('preview');
        const camWrap = document.getElementById('camWrap');
        const frameOver = document.getElementById('frameOverlay');
        const frameLabel = document.getElementById('frameLabel');
        const facingBadge = document.getElementById('facingBadge');
        const liveCtrls = document.getElementById('liveCtrls');
        const decCtrls = document.getElementById('decisionCtrls');
        const shutterBtn = document.getElementById('shutterBtn');
        const switchBtn = document.getElementById('switchBtn');
        const spinEl = document.getElementById('spin');
        const statusEl = document.getElementById('statusMsg');
        const ttl = document.getElementById('ttl');
        const sub = document.getElementById('sub');
        const camLoading = document.getElementById('camLoading');
        const camLoadingText = document.getElementById('camLoadingText');
        const camError = document.getElementById('camError');
        const camErrorText = document.getElementById('camErrorText');
        const qualityWarn = document.getElementById('qualityWarn');
        const qualityWarnText = document.getElementById('qualityWarnText');

        /* ─────────────────── TELEGRAM SETUP ─────────────────── */
        const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
        if (tg) {
            try {
                tg.ready();
                tg.expand();
                // Prevent Telegram from swallowing the page in a background/suspended state
                // mid-capture on iOS/Android, which is a common cause of the camera going black.
                if (typeof tg.disableVerticalSwipes === 'function') tg.disableVerticalSwipes();
                if (typeof tg.setHeaderColor === 'function') { try { tg.setHeaderColor('#0f0c29'); } catch (e) { } }
                if (typeof tg.enableClosingConfirmation === 'function') tg.enableClosingConfirmation();
            } catch (e) {
                console.warn('Telegram WebApp init warning:', e);
            }
        }

        function haptic(kind) {
            try {
                if (!tg || !tg.HapticFeedback) return;
                if (kind === 'success' || kind === 'error' || kind === 'warning') {
                    tg.HapticFeedback.notificationOccurred(kind);
                } else {
                    tg.HapticFeedback.impactOccurred(kind || 'light');
                }
            } catch (e) { /* no-op */ }
        }

        /* ─────────────────── STATE ─────────────────── */
        let stream = null;                 // the single live MediaStream, kept alive across retake
        let capturedBlob = null;
        let isSubmitting = false;
        let videoDevices = [];              // [{deviceId, label}]
        let currentDeviceId = null;         // deviceId actively in use, once known
        let currentFacing = PREFERRED_FACING;
        let deviceIndex = 0;                // index into videoDevices when we cycle through cameras
        let permissionGranted = false;
        let suspendedByVisibility = false;  // stream was intentionally stopped due to tab hidden

        /* ─────────────────── INIT ─────────────────── */
        (async function init() {
            applyMode();
            await startStream({ initial: true });
        })();

        /* ─────────────────── MODE SETUP ─────────────────── */
        function applyMode() {
            camWrap.className = 'cam-wrap mode-' + MODE;

            if (MODE === 'aadhaar') {
                ttl.textContent = 'Aadhaar Card Upload';
                sub.textContent = 'Place your Aadhaar card flat inside the blue frame, in good light.';
                frameOver.innerHTML = '<div class="frame-rect"></div>';
                frameLabel.textContent = 'Aadhaar Card Front';
            } else if (MODE === 'selfie') {
                ttl.textContent = 'Live Selfie Capture';
                sub.textContent = 'Look directly into the camera. Keep your face inside the circle.';
                frameOver.innerHTML = '<div class="frame-circle"></div>';
                frameLabel.textContent = 'Center Face Here';
            } else {
                ttl.textContent = 'Profile Picture';
                sub.textContent = 'Look directly into the camera and snap a fresh photo.';
                frameOver.innerHTML = '<div class="frame-circle"></div>';
                frameLabel.textContent = 'Center Face Here';
            }
        }

        /* ─────────────────── DEVICE DISCOVERY ─────────────────── */
        // Labels are only populated by the browser once permission has been granted at least once,
        // so we always call this AFTER a successful getUserMedia.
        async function refreshDeviceList() {
            try {
                const all = await navigator.mediaDevices.enumerateDevices();
                videoDevices = all.filter(d => d.kind === 'videoinput');
            } catch (e) {
                videoDevices = [];
            }

            // Only expose the switch button when there is genuinely something to switch to.
            if (videoDevices.length > 1) {
                switchBtn.classList.remove('hidden');
            } else {
                switchBtn.classList.add('hidden');
            }

            if (currentDeviceId) {
                const idx = videoDevices.findIndex(d => d.deviceId === currentDeviceId);
                if (idx >= 0) deviceIndex = idx;
            }
        }

        function guessFacingFromLabel(label) {
            if (!label) return null;
            const l = label.toLowerCase();
            if (l.includes('front') || l.includes('user') || l.includes('face')) return 'user';
            if (l.includes('back') || l.includes('rear') || l.includes('environment')) return 'environment';
            return null;
        }

        /* ─────────────────── STREAM ACQUISITION ─────────────────── */
        function buildConstraints({ deviceId, facingMode }) {
            const video = { width: { ideal: 1920 }, height: { ideal: 1080 } };
            if (deviceId) {
                video.deviceId = { exact: deviceId };
            } else if (facingMode) {
                video.facingMode = { ideal: facingMode };
            }
            return { video, audio: false };
        }

        async function acquireStream(opts) {
            // opts: { deviceId } or { facingMode }
            let s;
            try {
                s = await navigator.mediaDevices.getUserMedia(buildConstraints(opts));
            } catch (err) {
                if (opts.deviceId) {
                    // exact deviceId can fail if the device disappeared (rotation, disconnect) — fall back to facingMode
                    s = await navigator.mediaDevices.getUserMedia(buildConstraints({ facingMode: opts.facingMode || currentFacing }));
                } else {
                    // last-resort: any camera at all
                    s = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                }
            }
            return s;
        }

        function stopCurrentStream() {
            if (stream) {
                stream.getTracks().forEach(t => {
                    t.onended = null;
                    t.stop();
                });
                stream = null;
            }
        }

        async function attachStreamToVideo(newStream) {
            stream = newStream;

            const track = stream.getVideoTracks()[0];
            currentDeviceId = track && track.getSettings ? track.getSettings().deviceId || currentDeviceId : currentDeviceId;

            const label = track ? track.label : '';
            const settingsFacing = track && track.getSettings ? track.getSettings().facingMode : null;
            currentFacing = settingsFacing || guessFacingFromLabel(label) || currentFacing;

            // Re-detect camera drop caused by Telegram suspending the WebView / OS reclaiming the camera.
            track && (track.onended = () => {
                if (document.visibilityState === 'visible' && !suspendedByVisibility) {
                    handleStreamLoss();
                }
            });

            vid.srcObject = stream;
            vid.classList.toggle('mirrored', currentFacing === 'user');

            // Autoplay is unreliable inside Telegram's in-app WebView — drive it explicitly.
            await new Promise((resolve) => {
                const onReady = () => { vid.removeEventListener('loadedmetadata', onReady); resolve(); };
                vid.addEventListener('loadedmetadata', onReady);
                // Safety timeout in case the event never fires
                setTimeout(resolve, 1500);
            });

            try {
                await vid.play();
            } catch (e) {
                // Some WebViews block programmatic play() without a fresh user gesture on the very
                // first load. The visible shutter/switch taps that follow count as gestures, so a
                // silent retry on the next user interaction recovers this automatically.
            }

            updateFacingBadge();
        }

        function updateFacingBadge() {
            if (videoDevices.length > 1) {
                facingBadge.style.display = 'block';
                facingBadge.textContent = currentFacing === 'user' ? '🤳 Front' : '📷 Back';
            } else {
                facingBadge.style.display = 'none';
            }
        }

        async function startStream({ initial = false, deviceId = null, facingMode = null } = {}) {
            showCamLoading(initial ? 'Connecting to camera…' : 'Switching camera…');
            hideCamError();
            shutterBtn.disabled = true;
            switchBtn.disabled = true;

            try {
                const newStream = await acquireStream({
                    deviceId: deviceId || undefined,
                    facingMode: facingMode || currentFacing
                });

                stopCurrentStream(); // release the old camera only once the new one is confirmed
                await attachStreamToVideo(newStream);
                permissionGranted = true;

                await refreshDeviceList();

                vid.style.display = 'block';
                preview.style.display = 'none';
                frameOver.style.display = 'flex';
                frameLabel.style.display = 'block';
                liveCtrls.style.display = 'flex';
                decCtrls.style.display = 'none';
                qualityWarn.classList.remove('show');
                setStatus('', true);
            } catch (err) {
                console.error('Camera error:', err);
                showCamError(describeCameraError(err));
            } finally {
                hideCamLoading();
                shutterBtn.disabled = false;
                switchBtn.disabled = false;
            }
        }

        function describeCameraError(err) {
            const name = err && err.name ? err.name : '';
            if (name === 'NotAllowedError' || name === 'PermissionDeniedError') {
                return 'Camera permission was denied. Please allow camera access for Telegram, then tap "Try Again".';
            }
            if (name === 'NotFoundError' || name === 'DevicesNotFoundError') {
                return 'No camera was found on this device.';
            }
            if (name === 'NotReadableError' || name === 'TrackStartError') {
                return 'The camera is currently in use by another app. Close other camera apps and try again.';
            }
            if (name === 'OverconstrainedError') {
                return 'This camera doesn\u2019t support the requested settings. Trying a basic camera instead may help — tap "Try Again".';
            }
            return 'Couldn\u2019t access the camera. Make sure you\u2019re using an up-to-date Telegram app, then tap "Try Again".';
        }

        function showCamLoading(text) {
            camLoadingText.textContent = text || 'Connecting to camera…';
            camLoading.classList.add('show');
        }

        function hideCamLoading() {
            camLoading.classList.remove('show');
        }

        function showCamError(msg) {
            camErrorText.textContent = msg;
            camError.classList.add('show');
            vid.style.display = 'none';
            frameOver.style.display = 'none';
            frameLabel.style.display = 'none';
            liveCtrls.style.display = 'none';
            decCtrls.style.display = 'none';
            setStatus('');
        }

        function hideCamError() {
            camError.classList.remove('show');
        }

        function retryPermission() {
            startStream({ initial: true });
        }

        // If the camera track dies unexpectedly (e.g. Telegram reclaimed it), try a clean reconnect
        // instead of leaving the user staring at a frozen black frame.
        let recovering = false;
        async function handleStreamLoss() {
            if (recovering) return;
            recovering = true;
            setStatus('Reconnecting camera…', true);
            await startStream({ deviceId: currentDeviceId, facingMode: currentFacing });
            recovering = false;
        }

        // Pause the camera while the Telegram WebApp/tab is hidden and cleanly resume when it's
        // visible again — this avoids the "camera stuck black, asks for permission again" loop
        // that happens when a backgrounded stream gets silently killed by the OS.
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden') {
                if (stream && decCtrls.style.display !== 'flex') {
                    suspendedByVisibility = true;
                    stopCurrentStream();
                }
            } else if (document.visibilityState === 'visible') {
                if (suspendedByVisibility) {
                    suspendedByVisibility = false;
                    if (decCtrls.style.display !== 'flex') {
                        startStream({ deviceId: currentDeviceId, facingMode: currentFacing });
                    }
                }
            }
        });

        window.addEventListener('pagehide', stopCurrentStream);
        window.addEventListener('beforeunload', stopCurrentStream);

        /* ─────────────────── SWITCH CAMERA ─────────────────── */
        async function switchCam() {
            if (switchBtn.classList.contains('hidden') || switchBtn.disabled) return;
            haptic('light');

            if (videoDevices.length > 1) {
                deviceIndex = (deviceIndex + 1) % videoDevices.length;
                const next = videoDevices[deviceIndex];
                const guessedFacing = guessFacingFromLabel(next.label) || (currentFacing === 'user' ? 'environment' : 'user');
                await startStream({ deviceId: next.deviceId, facingMode: guessedFacing });
            } else {
                // Fallback: simple front/back toggle by facingMode only
                const nextFacing = currentFacing === 'user' ? 'environment' : 'user';
                await startStream({ facingMode: nextFacing });
            }
        }

        /* ─────────────────── CAPTURE ─────────────────── */
        // Maps the CSS-space frame overlay (the dashed rectangle the user is shown)
        // to actual source-video pixel coordinates, accounting for how object-fit:
        // cover crops/scales the raw camera feed to fill the container. Without this,
        // the capture always contained the full camera view instead of just what the
        // frame outlined.
        function getFrameSourceRect() {
            const cw = camWrap.clientWidth;
            const ch = camWrap.clientHeight;
            const vw = vid.videoWidth;
            const vh = vid.videoHeight;
            if (!cw || !ch || !vw || !vh) return null;

            // object-fit: cover scaling — video is scaled up to fully cover the
            // container, then centered and cropped on the overflowing axis.
            const scale = Math.max(cw / vw, ch / vh);
            const dispW = vw * scale;
            const dispH = vh * scale;
            const cropX = (dispW - cw) / 2; // pixels cropped off each side, in displayed space
            const cropY = (dispH - ch) / 2;

            let rectW, rectH, rectX, rectY;
            if (MODE === 'aadhaar') {
                rectW = cw * 0.92;
                rectH = rectW / 1.586; // matches .frame-rect aspect-ratio
            } else {
                // selfie/profile: circle guide — no tighter crop needed, the square
                // container already matches what's shown.
                return null;
            }
            rectX = (cw - rectW) / 2;
            rectY = (ch - rectH) / 2;

            // Convert CSS-space rect -> displayed-video-space -> source-video pixels
            const sx = (rectX + cropX) / scale;
            const sy = (rectY + cropY) / scale;
            const sw = rectW / scale;
            const sh = rectH / scale;

            return {
                sx: Math.max(0, sx),
                sy: Math.max(0, sy),
                sw: Math.min(sw, vw),
                sh: Math.min(sh, vh)
            };
        }

        function capture() {
            if (!vid.videoWidth) { setStatus('⚠️ Camera not ready yet, give it a second.'); return; }

            const frameRect = getFrameSourceRect();

            // Source region to read from the video: either the full frame, or (for
            // Aadhaar) just the area inside the dashed rectangle guide.
            const srcX = frameRect ? frameRect.sx : 0;
            const srcY = frameRect ? frameRect.sy : 0;
            const srcW = frameRect ? frameRect.sw : vid.videoWidth;
            const srcH = frameRect ? frameRect.sh : vid.videoHeight;

            let w = srcW;
            let h = srcH;
            const maxDim = 1024;
            if (w > maxDim || h > maxDim) {
                if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
                else { w = Math.round(w * maxDim / h); h = maxDim; }
            }

            const canvas = document.createElement('canvas');
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext('2d');

            // Mirror back into the canvas too, so the saved photo matches what the user saw on screen.
            if (currentFacing === 'user') {
                ctx.translate(w, 0);
                ctx.scale(-1, 1);
            }
            ctx.drawImage(vid, srcX, srcY, srcW, srcH, 0, 0, w, h);
            if (currentFacing === 'user') {
                ctx.setTransform(1, 0, 0, 1, 0, 0);
            }

            const quality = assessFrameQuality(ctx, w, h);

            canvas.toBlob(blob => {
                if (!blob) { setStatus('❌ Failed to capture frame.'); return; }
                if (blob.size < 4000) {
                    setStatus('⚠️ That capture looks empty or corrupted — please retake.');
                    haptic('error');
                    return;
                }

                const reader = new FileReader();
                reader.onloadend = () => {
                    const stamped = injectTimestamp(reader.result);
                    capturedBlob = new Blob([stamped], { type: 'image/jpeg' });

                    // Show the still preview ON TOP of the live video (both are absolutely
                    // positioned; preview simply sits above it in stacking order) instead of
                    // hiding the <video> element. Some mobile WebViews stop decoding frames
                    // once a <video> is display:none, which froze the feed permanently and
                    // made Retake show a stale, non-live picture. Leaving the video running
                    // underneath means Retake is instant and always shows the real live feed.
                    frameOver.style.display = 'none';
                    frameLabel.style.display = 'none';
                    facingBadge.style.display = 'none';
                    preview.src = URL.createObjectURL(capturedBlob);
                    preview.style.display = 'block';

                    liveCtrls.style.display = 'none';
                    decCtrls.style.display = 'flex';

                    if (quality.warning) {
                        qualityWarnText.textContent = quality.warning;
                        qualityWarn.classList.add('show');
                    } else {
                        qualityWarn.classList.remove('show');
                    }

                    setStatus('');
                    haptic('success');
                };
                reader.readAsArrayBuffer(blob);
            }, 'image/jpeg', 0.88);
        }

        // Lightweight heuristic check (no ML): flags frames that are almost uniformly dark or
        // uniformly flat (lens covered, camera still warming up, pointed at a blank wall).
        function assessFrameQuality(ctx, w, h) {
            try {
                const sampleW = 64, sampleH = 64;
                const off = document.createElement('canvas');
                off.width = sampleW;
                off.height = sampleH;
                const octx = off.getContext('2d');
                octx.drawImage(ctx.canvas, 0, 0, w, h, 0, 0, sampleW, sampleH);
                const data = octx.getImageData(0, 0, sampleW, sampleH).data;

                let sum = 0, sumSq = 0, n = 0;
                for (let i = 0; i < data.length; i += 4) {
                    const lum = (data[i] * 0.299 + data[i + 1] * 0.587 + data[i + 2] * 0.114);
                    sum += lum;
                    sumSq += lum * lum;
                    n++;
                }
                const mean = sum / n;
                const variance = (sumSq / n) - (mean * mean);

                if (mean < 18) {
                    return { warning: 'This photo looks very dark. Move to better light and retake if needed.' };
                }
                if (variance < 6) {
                    return { warning: 'This photo looks blank or out of focus — retake if the ' + (MODE === 'aadhaar' ? 'card' : 'photo') + " isn't clearly visible." };
                }
                return { warning: null };
            } catch (e) {
                return { warning: null };
            }
        }

        /* ─────────────────── RETAKE ─────────────────── */
        function retake() {
            haptic('light');
            capturedBlob = null;
            qualityWarn.classList.remove('show');
            decCtrls.style.display = 'none';

            // The stream was never stopped on capture, so the video underneath has
            // been live the whole time — we just need to hide the still preview
            // image again to reveal it. (Previously this never hid `preview`, so
            // the old photo stayed visually on top forever — that's why camera
            // movement never appeared to "take" after a retake.)
            preview.style.display = 'none';

            if (stream && stream.getVideoTracks().some(t => t.readyState === 'live')) {
                frameOver.style.display = 'flex';
                frameLabel.style.display = 'block';
                liveCtrls.style.display = 'flex';
                updateFacingBadge();
                setStatus('', true);
                vid.play().catch(() => { });
            } else {
                // Stream died in the background for some reason — reconnect cleanly.
                startStream({ deviceId: currentDeviceId, facingMode: currentFacing });
            }
        }

        /* ─────────────────── SUBMIT ─────────────────── */
        async function submit() {
            if (!capturedBlob || isSubmitting) return;
            isSubmitting = true;
            haptic('light');

            decCtrls.style.display = 'none';
            spinEl.style.display = 'block';
            setStatus('📤 Uploading photo…', true);

            let fileID;
            try {
                fileID = await uploadToTmpfiles(capturedBlob);
            } catch (e) {
                spinEl.style.display = 'none';
                decCtrls.style.display = 'flex';
                isSubmitting = false;
                haptic('error');
                setStatus('❌ Upload failed: ' + e.message);
                return;
            }

            const downloadUrl = `https://tmpfiles.org/dl/${fileID}/capture.jpg`;

            stopCurrentStream(); // release the camera before we navigate away

            if (tg && typeof tg.sendData === 'function') {
                try {
                    tg.sendData(downloadUrl);
                    tg.close();
                    return;
                } catch (e) {
                    console.error('Telegram WebApp sendData failed: ', e);
                }
            }

            /*
             * Build the Telegram deep link payload (fallback for external browsers).
             * Format: photo_MODE_USERID_FILEID
             * Telegram /start parameter limit = 64 chars (A-Z a-z 0-9 _ -)
             */
            const payload = `photo_${MODE}_${USER_ID}_${fileID}`;

            if (payload.length > 64) {
                spinEl.style.display = 'none';
                decCtrls.style.display = 'flex';
                isSubmitting = false;
                setStatus('❌ Payload too long (' + payload.length + ' chars). Contact support.');
                return;
            }

            const botLink = `https://t.me/${BOT}?start=${payload}`;

            setStatus('✅ Photo uploaded! Redirecting…', true);
            statusEl.className = 'status ok';
            haptic('success');

            setTimeout(() => {
                window.location.href = botLink;

                document.body.innerHTML = `
                    <div style="height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; text-align: center;">
                        <div style="background: var(--card-bg); backdrop-filter: blur(24px); border: 1px solid var(--border); border-radius: 28px; padding: 40px 22px; width: 100%; max-width: 400px; box-shadow: 0 30px 60px rgba(0,0,0,.45);">
                            <div style="font-size: 54px; margin-bottom: 20px; animation: scaleUp 0.4s ease-out;">✅</div>
                            <h1 style="font-size: 23px; font-weight: 700; margin-bottom: 12px; color: #fff;">Submission Complete!</h1>
                            <p style="color: var(--muted); font-size: 14px; line-height: 1.6; margin-bottom: 24px;">You have been redirected back to the Nestora bot. You can now close this browser tab.</p>
                            <button onclick="window.close()" style="background: linear-gradient(135deg, var(--purple), var(--purple-light)); color: #fff; padding: 14px 28px; border-radius: 14px; font-size: 15px; font-weight: 700; border: none; cursor: pointer; box-shadow: 0 6px 20px rgba(124,58,237,.42); width: 100%; transition: transform 0.2s;">Close Tab</button>
                        </div>
                    </div>
                `;

                setTimeout(() => {
                    window.close();
                }, 5000);
            }, 1000);
        }

        /* ─────────────────── UPLOAD ─────────────────── */
        async function uploadToTmpfiles(blob) {
            const fd = new FormData();
            fd.append('file', blob, 'capture.jpg');

            const res = await fetch('https://tmpfiles.org/api/v1/upload', { method: 'POST', body: fd });
            if (!res.ok) throw new Error(`Server returned ${res.status}`);

            const json = await res.json();
            if (json.status !== 'success' || !json.data?.url)
                throw new Error('Bad response from upload server');

            const viewUrl = json.data.url;
            const match = viewUrl.match(/tmpfiles\.org\/([\w]+)\//i);
            if (!match) throw new Error('Could not parse file ID from: ' + viewUrl);
            return match[1];
        }

        /* ─────────────────── JPEG TIMESTAMP (liveness) ─────────────────── */
        function injectTimestamp(buf) {
            const u8 = new Uint8Array(buf);
            if (u8[0] !== 0xFF || u8[1] !== 0xD8) return u8;

            const now = new Date();
            const p = n => String(n).padStart(2, '0');
            const ts = `${now.getFullYear()}:${p(now.getMonth() + 1)}:${p(now.getDate())} ${p(now.getHours())}:${p(now.getMinutes())}:${p(now.getSeconds())}`;
            const com = new TextEncoder().encode(ts);
            const len = com.length + 2;
            const hdr = new Uint8Array([0xFF, 0xFE, (len >> 8) & 0xFF, len & 0xFF]);

            let insertOffset = 2;
            if (u8[2] === 0xFF && (u8[3] === 0xE0 || u8[3] === 0xE1)) {
                const appLength = (u8[4] << 8) + u8[5];
                insertOffset = 2 + appLength;
            }
            if (insertOffset > u8.length) {
                insertOffset = 2;
            }

            const out = new Uint8Array(u8.length + hdr.length + com.length);
            out.set(u8.subarray(0, insertOffset), 0);
            out.set(hdr, insertOffset);
            out.set(com, insertOffset + hdr.length);
            out.set(u8.subarray(insertOffset), insertOffset + hdr.length + com.length);
            return out;
        }

        /* ─────────────────── HELPER ─────────────────── */
        function setStatus(msg, quiet = false) {
            statusEl.textContent = msg;
            statusEl.className = 'status' + (quiet ? ' muted' : '');
        }
    </script>
</body>

</html>
